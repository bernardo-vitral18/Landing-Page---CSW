<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="imagens/images.png" type="image/x-icon">
    <title>Landing Page </title>
    <link rel="stylesheet" href="estilo.css">
     <style>
        header {
            padding: 15px;
            text-align: center;
            color: rgb(255, 255, 255);
        }

        nav {
            color:#f4f4f4;
        }

        .menu {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .menu li {
            position: relative;
        }

        .menu>li>a {
            display: block;
            padding: 12px 20px;
            color: var(--cor-texto-principal);
            text-decoration: none;
            font-weight: bold;
        }

        .menu>li>a:hover {
            background-color: var(--cor-barra-navegacao);
            color: var(--cor-branco);
         
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(to right, #00071d, #00071d);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 90%;
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }


        h2 {
            text-align: center;
            color: #0d4a75;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
            color: #333;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        select,

        textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-sizing: border-box;

        }

        fieldset {
            border: 1px solid #ccc;
            border-radius: 6px;
            margin-top: 15px;
            padding: 10px;
        }

        legend {
            font-weight: bold;
            color: #2e86c1;
        }

        .botoes {
            text-align: center;
            margin-top: 20px
        }

        input[type="submit"],
        input[type="reset"] {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
            font-size: 1em;
        }

        input[type=submit]:hover input[type="reset"]:hover {
            background-color: #21618c;
        }

        textarea {
            resize: vertical;
        }

      footer {
    background-color: var(--cor-destaque-cabecalho);
    color: white;
    text-align: center;
    padding: 10px;
    margin-top: 40px;
}
    </style>
</head>

<body>
    <header>
        <h1>Landing Page Bernardo Vitral</h1>
    </header>

    <nav>
        <ul class="menu">
            <li><a href="index.html">Home</a></li>

            <li><a href="sobre.html">Sobre</a></li>

            <li>
                <a href="servico.html">Serviços</a>
            </li>

            <li><a href="contato.html">Contato</a></li>
        </ul>
    </nav>

    <div class="container">
        <h2>Formulário de Serviços</h2>
        <form action="#" method="post">


            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required>

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="exemplo@email.com" required>
            <br><br>
            <label for="tel">Telefone:</label>
            <input type="tel" id="tel" name="Telefone" placeholder="(00)xxxxx-xxxx">

            <br><br>
            <fieldset>
                <legend>Pessoa Física ou Jurídica:</legend>
                <label><input type="radio" name="pessoa fisica" value="Pessoa Física"> Pessoa Física</label>
                <label><input type="radio" name="pessoa juridica"="feminino"> Pessoas Jurídica</label>
                <br>
                <label for="texto">CPF ou CNPJ</label>
                <input type="text" id="cpfcnpj" name="tipopessoa" placeholder="Digite seu CPF ou CNPJ">
            </fieldset>
            <br>

            <fieldset>
                <legend>Tipo de Serviço:</legend>
                <label><input type="checkbox" name="interesse" value="Site com 1 a 2 paginas"> Site com 1 a 2
                    páginas</label>
                <label><input type="checkbox" name="interesse" value="Site com 3 a 5 paginas"> Site com 3 a 5
                    páginas</label>
                <label><input type="checkbox" name="interesse" value="Site com 5 ou mais paginas"> Site com 5 ou mais
                    páginas</label>
                <label><input type="checkbox" name="interesse" value="Site Dinamico	"> Site Dinâmico</label>
                <label><input type="checkbox" name="interesse" value="Site c/ páginas avançadas">Site c/ páginas
                    avançadas</label>
            </fieldset>
            <br>

             <label for="horario">Horário e data para contato:</label><br>
            <input type="date" id="horario" name="hour" required>
            <input type="horario" id="horario" name="hour" placeholder="Digite o horário (Ex.:15:00)" required>


            <label for="mensagem">Mensagem:</label>
            <textarea id="mensagem" name="mensagem" cols="50" rows="2" placeholder="Digite mensagem..."></textarea>
            <br><br>
            <div class="botoes">
                <input type="submit" value="Enviar">
                <input type="reset" value="Limpar">
            </div>
        </form>
    </div>

    <br>
    <footer>© 2026 Landing Page Bernardo Vitral - Todos os direitos reservados.</footer>
</body>
</html>
